<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix&amp;Go — Messages</title>
  <link rel="stylesheet" href="../../../bootstrap-5.3.8-dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="../../../assets/css/auth.css?v=4" />
    <link rel="stylesheet" href="../../../assets/css/supplier.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    body { background: var(--fg-bg); }

    .supplier-layout { display: flex; min-height: calc(100vh - 65px); }

    .supplier-sidebar {
      width: 240px;
      background: var(--fg-card-bg);
      border-right: 1px solid var(--fg-border);
      padding: 1.5rem 0;
      flex-shrink: 0;
      position: sticky;
      top: 65px;
      height: calc(100vh - 65px);
      overflow-y: auto;
    }

    .sidebar-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--fg-muted);
      padding: 0 1.25rem;
      margin-bottom: 0.5rem;
    }

    .sidebar-nav { list-style: none; padding: 0; margin: 0; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1.25rem;
      color: var(--fg-muted);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 500;
      border-left: 3px solid transparent;
      transition: all 0.2s ease;
    }

    .sidebar-nav a:hover {
      color: var(--fg-primary);
      background: rgba(230,168,0,0.07);
      border-left-color: var(--fg-primary);
    }

    .sidebar-nav a.active {
      color: var(--fg-primary);
      background: rgba(230,168,0,0.1);
      border-left-color: var(--fg-primary);
      font-weight: 700;
    }

    .sidebar-nav a i { font-size: 1rem; width: 20px; text-align: center; }

    .supplier-main { flex: 1; padding: 2rem; min-width: 0; }

    /* ── Chat layout ── */
    .chat-container {
      display: flex;
      height: calc(100vh - 65px - 4rem);
      min-height: 500px;
      background: var(--fg-card-bg);
      border-radius: var(--fg-radius);
      border: 1px solid var(--fg-border);
      overflow: hidden;
      box-shadow: var(--fg-shadow);
    }

    /* ── Conversations panel ── */
    .conv-panel {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--fg-border);
      display: flex;
      flex-direction: column;
    }

    .conv-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--fg-border);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--fg-text);
    }

    .conv-list { overflow-y: auto; flex: 1; }

    .conv-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.25rem;
      cursor: pointer;
      border-bottom: 1px solid var(--fg-border);
      transition: background 0.15s ease;
      position: relative;
    }

    .conv-item:hover { background: rgba(230,168,0,0.06); }

    .conv-item.active {
      background: rgba(230,168,0,0.1);
      border-left: 3px solid var(--fg-primary);
    }

    .conv-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }

    .conv-info { flex: 1; min-width: 0; }

    .conv-name {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--fg-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conv-preview {
      font-size: 0.78rem;
      color: var(--fg-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.1rem;
    }

    .conv-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.3rem;
      flex-shrink: 0;
    }

    .conv-time { font-size: 0.72rem; color: var(--fg-muted); }

    .unread-badge {
      background: var(--fg-primary);
      color: #fff;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 0.65rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Chat panel ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chat-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--fg-border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .chat-header-name { font-weight: 700; font-size: 0.95rem; color: var(--fg-text); }
    .chat-header-sub  { font-size: 0.78rem; color: var(--fg-muted); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .msg-bubble {
      max-width: 70%;
      padding: 0.65rem 1rem;
      border-radius: 16px;
      font-size: 0.88rem;
      line-height: 1.5;
      position: relative;
    }

    .msg-bubble.incoming {
      background: var(--fg-bg);
      border: 1px solid var(--fg-border);
      color: var(--fg-text);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .msg-bubble.outgoing {
      background: var(--fg-primary);
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 0.7rem;
      color: var(--fg-muted);
      margin-top: 0.2rem;
      text-align: right;
    }

    .msg-time.outgoing { text-align: right; }
    .msg-time.incoming { text-align: left; }

    .msg-wrapper { display: flex; flex-direction: column; }
    .msg-wrapper.outgoing { align-items: flex-end; }
    .msg-wrapper.incoming { align-items: flex-start; }

    /* Chat input */
    .chat-input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--fg-border);
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }

    .chat-input {
      flex: 1;
      background: var(--fg-bg);
      border: 1.5px solid var(--fg-border);
      border-radius: 20px;
      padding: 0.6rem 1rem;
      font-size: 0.88rem;
      color: var(--fg-text);
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      max-height: 100px;
    }

    .chat-input:focus { border-color: var(--fg-primary); }

    .btn-send {
      background: var(--fg-primary);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    .btn-send:hover { background: var(--fg-primary-dark); transform: scale(1.08); }

    /* Empty state */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--fg-muted);
      gap: 0.5rem;
    }

    /* Sidebar toggle */
    .sidebar-toggle {
      display: none;
      background: none;
      border: 1.5px solid var(--fg-border);
      border-radius: 8px;
      padding: 0.3rem 0.6rem;
      color: var(--fg-text);
      cursor: pointer;
      font-size: 1.1rem;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 199;
    }

    .sidebar-overlay.open { display: block; }

    @media (max-width: 768px) {
      .sidebar-toggle { display: flex; align-items: center; }

      .supplier-sidebar {
        position: fixed;
        top: 65px;
        left: 0;
        z-index: 200;
        transform: translateX(-100%);
        height: calc(100vh - 65px);
        box-shadow: 4px 0 20px rgba(0,0,0,0.15);
        transition: transform 0.3s ease;
      }

      .supplier-sidebar.open { transform: translateX(0); }
      .supplier-main { padding: 1rem; }

      .conv-panel { width: 220px; }
      .msg-bubble { max-width: 85%; }
    }

    @media (max-width: 576px) {
      .conv-panel { width: 180px; }
      .conv-name { font-size: 0.8rem; }
      .conv-preview { display: none; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="fg-navbar" role="navigation" aria-label="Main navigation">
    <div class="d-flex align-items-center gap-3">
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
        <i class="bi bi-list"></i>
      </button>
      <a href="../../../dashboard.html" style="text-decoration:none;display:flex;align-items:center;">
        <img src="../../../assets/images/logo.png" alt="Fix&amp;Go" style="height:48px;width:auto;object-fit:contain;"
             onerror="this.outerHTML='<span style=\'font-size:1.2rem;font-weight:800;color:var(--fg-primary);\'>🔧 Fix&amp;Go</span>'">
      </a>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span class="role-badge supplier">📦 Supplier</span>
      <span id="navUserName" style="font-size:0.9rem;font-weight:600;color:var(--fg-text);"></span>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
        <i class="bi bi-moon-fill" id="themeIcon"></i>
      </button>
      <!-- Notification Bell -->
      <div class="notif-wrap" id="notifWrap" style="position:relative;">
        <button class="notif-bell" id="notifBellBtn" onclick="toggleNotifDropdown()" aria-label="Notifications">
          <i class="bi bi-bell-fill"></i>
          <span class="notif-count" id="notifCount" style="display:none;">0</span>
        </button>
        <div class="notif-dropdown" id="notifDropdown" style="display:none;">
          <div class="notif-header">
            <span>Notifications</span>
            <button onclick="markAllRead()" style="background:none;border:none;color:var(--fg-primary);font-size:0.75rem;font-weight:700;cursor:pointer;">Mark all read</button>
          </div>
          <div id="notifList"><div style="padding:1.5rem;text-align:center;color:var(--fg-muted);font-size:0.83rem;">Loading…</div></div>
        </div>
      </div>
      <a href="../../../dashboard.html" class="btn btn-sm"
         style="border:1.5px solid var(--fg-border);border-radius:8px;color:var(--fg-muted);background:transparent;font-size:0.85rem;text-decoration:none;">
        <i class="bi bi-arrow-left"></i> Back
      </a>

    <!-- Sidebar -->
    <aside class="supplier-sidebar" id="supplierSidebar">
      <div class="sidebar-label">Navigation</div>
      <ul class="sidebar-nav">
        <li><a href="dashboard.html"><i class="bi bi-house-fill"></i> Dashboard</a></li>
        <li><a href="products.html"><i class="bi bi-box-seam"></i> Products</a></li>
        <li><a href="orders.html"><i class="bi bi-cart3"></i> Orders</a></li>
        <li><a href="deliveries.html"><i class="bi bi-truck"></i> Deliveries</a></li>
        <li><a href="sales-report.html"><i class="bi bi-bar-chart-line"></i> Sales Report</a></li>
        <li><a href="messages.html" class="active"><i class="bi bi-chat-dots"></i> Messages</a></li>
        <li><a href="profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="supplier-main">

      <!-- Page header -->
      <div class="mb-3">
        <h2 style="font-weight:800;color:var(--fg-text);margin:0;">Messages</h2>
        <p style="color:var(--fg-muted);margin:0;font-size:0.9rem;">Chat with your partner shops</p>
      </div>

      <!-- Chat container -->
      <div class="chat-container">

        <!-- Conversations list -->
        <div class="conv-panel">
          <div class="conv-header">
            <i class="bi bi-chat-dots me-2" style="color:var(--fg-primary);"></i>Conversations
          </div>
          <div class="conv-list" id="convList"></div>
        </div>

        <!-- Chat area -->
        <div class="chat-panel" id="chatPanel">
          <div class="chat-empty" id="chatEmpty">
            <i class="bi bi-chat-square-dots" style="font-size:3rem;opacity:0.3;"></i>
            <span style="font-size:0.9rem;">Select a conversation to start chatting</span>
          </div>
        </div>

      </div>

    </main>
  </div>

  <script src="../../../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <script src="../../../assets/js/theme.js"></script>
  <script src="../../../assets/js/auth-utils.js"></script>
  <script src="../../assets/js/session-timeout.js"></script>
  <script>
    // ── Sample data ──
    const CONVERSATIONS = [
      {
        id: 1,
        name: 'QuickFix Manila',
        initials: 'QM',
        color: '#3b82f6',
        preview: 'Can you ship by tomorrow?',
        time: '10:32 AM',
        unread: 2,
        messages: [
          { from: 'them', text: 'Hi! We need 5 units of iPhone 13 LCD ASAP.', time: '10:15 AM' },
          { from: 'me',   text: 'Sure! We have them in stock. I can ship today.', time: '10:20 AM' },
          { from: 'them', text: 'Can you ship by tomorrow?', time: '10:32 AM' },
        ],
      },
      {
        id: 2,
        name: 'TechRepair Cebu',
        initials: 'TC',
        color: '#10b981',
        preview: 'Order received, thanks!',
        time: 'Yesterday',
        unread: 0,
        messages: [
          { from: 'me',   text: 'Your order ORD-502 has been processed.', time: 'Yesterday 2:00 PM' },
          { from: 'them', text: 'Order received, thanks!', time: 'Yesterday 3:15 PM' },
        ],
      },
      {
        id: 3,
        name: 'GadgetFix BGC',
        initials: 'GB',
        color: '#7c3aed',
        preview: 'Do you have Samsung S23 parts?',
        time: 'Jun 10',
        unread: 1,
        messages: [
          { from: 'them', text: 'Do you have Samsung S23 parts?', time: 'Jun 10, 9:00 AM' },
        ],
      },
      {
        id: 4,
        name: 'iRepair Davao',
        initials: 'ID',
        color: '#ea580c',
        preview: 'Please update tracking info.',
        time: 'Jun 9',
        unread: 0,
        messages: [
          { from: 'them', text: 'Please update tracking info for DEL-104.', time: 'Jun 9, 4:00 PM' },
          { from: 'me',   text: 'Tracking number: JT-20250609-104. Flash Express.', time: 'Jun 9, 4:30 PM' },
        ],
      },
      {
        id: 5,
        name: 'PhoneFix QC',
        initials: 'PQ',
        color: '#059669',
        preview: 'Looking forward to the delivery.',
        time: 'Jun 8',
        unread: 0,
        messages: [
          { from: 'me',   text: 'Order ORD-505 is being prepared for pickup.', time: 'Jun 8, 11:00 AM' },
          { from: 'them', text: 'Looking forward to the delivery.', time: 'Jun 8, 11:45 AM' },
        ],
      },
    ];

    let activeConvId = null;

    function renderConvList() {
      const list = document.getElementById('convList');
      list.innerHTML = CONVERSATIONS.map(c => `
        <div class="conv-item ${c.id === activeConvId ? 'active' : ''}" onclick="openConv(${c.id})">
          <div class="conv-avatar" style="background:${c.color};">${c.initials}</div>
          <div class="conv-info">
            <div class="conv-name">${c.name}</div>
            <div class="conv-preview">${c.preview}</div>
          </div>
          <div class="conv-meta">
            <span class="conv-time">${c.time}</span>
            ${c.unread ? `<span class="unread-badge">${c.unread}</span>` : ''}
          </div>
        </div>
      `).join('');
    }

    function openConv(id) {
      activeConvId = id;
      const conv = CONVERSATIONS.find(c => c.id === id);
      if (!conv) return;

      // Clear unread
      conv.unread = 0;
      renderConvList();

      const panel = document.getElementById('chatPanel');
      panel.innerHTML = `
        <div class="chat-header">
          <div class="conv-avatar" style="background:${conv.color};width:36px;height:36px;font-size:0.9rem;">${conv.initials}</div>
          <div>
            <div class="chat-header-name">${conv.name}</div>
            <div class="chat-header-sub"><i class="bi bi-circle-fill" style="font-size:0.5rem;color:#10b981;"></i> Online</div>
          </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
          <textarea class="chat-input" id="chatInput" rows="1" placeholder="Type a message…"></textarea>
          <button class="btn-send" id="btnSend" title="Send">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
      `;

      renderMessages(conv);

      // Auto-resize textarea
      const input = document.getElementById('chatInput');
      input.addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
      });

      // Send on Enter (Shift+Enter for newline)
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(conv);
        }
      });

      document.getElementById('btnSend').addEventListener('click', function () {
        sendMessage(conv);
      });
    }

    function renderMessages(conv) {
      const container = document.getElementById('chatMessages');
      if (!container) return;
      container.innerHTML = conv.messages.map(m => `
        <div class="msg-wrapper ${m.from === 'me' ? 'outgoing' : 'incoming'}">
          <div class="msg-bubble ${m.from === 'me' ? 'outgoing' : 'incoming'}">${escapeHtml(m.text)}</div>
          <div class="msg-time ${m.from === 'me' ? 'outgoing' : 'incoming'}">${m.time}</div>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage(conv) {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text) return;

      const now = new Date();
      const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

      conv.messages.push({ from: 'me', text, time });
      conv.preview = text;
      conv.time = time;

      input.value = '';
      input.style.height = 'auto';

      renderMessages(conv);
      renderConvList();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.addEventListener('DOMContentLoaded', function () {
      // Auth guard
      const user = FGAuth.UserStore.get();
      if (!user || user.role !== 'supplier') {
        window.location.href = '../../../login.html';
        return;
      }

      const fullName = (user.firstName || '') + ' ' + (user.lastName || '');
      document.getElementById('navUserName').textContent = fullName.trim() || user.email || 'Supplier';

      renderConvList();

      // Auto-open first conversation
      openConv(1);

      // Sidebar toggle
      const sidebar   = document.getElementById('supplierSidebar');
      const overlay   = document.getElementById('sidebarOverlay');
      const toggleBtn = document.getElementById('sidebarToggle');

      toggleBtn.addEventListener('click', function () {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('open');
      });

      overlay.addEventListener('click', function () {
        sidebar.classList.remove('open');
        overlay.classList.remove('open');
      });
    });
  </script>
</body>
</html>
