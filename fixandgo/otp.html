<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <script>window.FG_BACKEND = 'backend/';</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- PWA -->
  <meta name="theme-color" content="#e6a800">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fix&amp;Go">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../assets/images/icons/icon-192.png">
  <link rel="stylesheet" href="../assets/css/mobile.css">
  <title>Fix&amp;Go — Verify Email</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
</head>
<body>

  <!-- Theme Toggle -->
  <div style="position:fixed;top:1rem;right:1rem;z-index:200;">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
      <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
  </div>

  <main class="auth-bg">
    <div class="auth-card" style="max-width:440px; text-align:center;">

      <!-- Logo -->
      <div class="logo-area">
        <a href="login.html" class="logo-placeholder">
          <span class="logo-icon">🔧</span> Fix&amp;Go
        </a>
      </div>

      <!-- Icon -->
      <div style="font-size:3rem; margin-bottom:0.75rem;">📧</div>

      <h1 class="auth-title">Check your email</h1>
      <p class="auth-subtitle" id="otpSubtitle">
        We sent a 6-digit code to <strong id="otpEmail">your email</strong>.<br/>
        Enter it below to verify your account.
      </p>

      <!-- Alert -->
      <div id="otpAlert" class="auth-alert alert d-none mb-3" role="alert"></div>

      <!-- OTP Inputs -->
      <form id="otpForm" novalidate>
        <input type="hidden" name="_csrf" id="csrfToken" />

        <div class="otp-group" role="group" aria-label="One-time password input">
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5" />
          <input class="otp-input" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6" />
        </div>

        <!-- Countdown -->
        <div class="otp-countdown mb-3">
          Code expires in <span class="timer" id="otpTimer">10:00</span>
        </div>

        <!-- Verify button -->
        <button type="submit" class="btn btn-primary-fg mb-3" id="verifyBtn" disabled>
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-text">Verify Email</span>
        </button>

        <!-- Resend -->
        <p class="fs-sm" style="color:var(--fg-muted);">
          Didn't receive the code?
          <button type="button" class="auth-link border-0 bg-transparent p-0 fs-sm fw-700" id="resendBtn" disabled>
            Resend OTP
          </button>
          <span id="resendCountdown" class="fs-sm" style="color:var(--fg-muted);"></span>
        </p>

        <p class="fs-sm mt-2 mb-0" style="color:var(--fg-muted);">
          <a href="../register.php" class="auth-link">← Back to registration</a>
        </p>
      </form>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    window.FG_BACKEND = 'backend/';
  </script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/auth-utils.js"></script>
  <script src="assets/js/otp.js"></script>
  <script src="assets/js/pwa.js" defer></script>
</body>
</html>
