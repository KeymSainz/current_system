<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f0f0f0"/>
  <rect x="1" y="1" width="398" height="398" fill="none" stroke="#dddddd" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- Camera icon -->
  <g transform="translate(200,170)">
    <rect x="-52" y="-38" width="104" height="76" rx="10" fill="none" stroke="#bbbbbb" stroke-width="3"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#bbbbbb" stroke-width="3"/>
    <circle cx="0" cy="0" r="10" fill="#cccccc"/>
    <rect x="-8" y="-46" width="16" height="10" rx="3" fill="#bbbbbb"/>
    <circle cx="38" cy="-28" r="5" fill="#cccccc"/>
  </g>
  <!-- Upload arrow -->
  <g transform="translate(200,270)">
    <line x1="0" y1="20" x2="0" y2="-10" stroke="#bbbbbb" stroke-width="3" stroke-linecap="round"/>
    <polyline points="-12,2 0,-12 12,2" fill="none" stroke="#bbbbbb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="200" y="320" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#aaaaaa" font-weight="600">Click to upload image</text>
  <text x="200" y="342" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#bbbbbb">PNG, JPG, WEBP — max 5MB</text>
</svg>
