<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fix&amp;Go — Login</title>
  <link rel="stylesheet" href="../bootstrap-5.3.8-dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/auth.css?v=5" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <style>
    /* Modal-style backdrop effect with landing page background */
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    
    /* Landing page iframe as background */
    #landingBackground {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
      pointer-events: none;
    }
    
    /* Backdrop overlay - sits on top of iframe to darken/blur it */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      z-index: 2;
      pointer-events: none;
    }
    
    .auth-bg {
      position: relative;
      z-index: 3;
    }
    .auth-card {
      animation: modalSlideIn 0.3s ease-out;
    }
    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    /* Close button */
    .modal-close-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.3);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 10;
    }
    .modal-close-btn:hover {
      background: rgba(239, 68, 68, 0.8);
      border-color: #ef4444;
      color: #fff;
      transform: rotate(90deg);
    }
  </style>
</head>
<body>

  <!-- Landing page as background -->
  <iframe id="landingBackground" src="index.html" title="Background"></iframe>

  <!-- Close Button -->
  <a href="index.html" class="modal-close-btn" title="Back to Home">
    <i class="bi bi-x-lg" style="font-size: 1.2rem;"></i>
  </a>

  <!-- Theme Toggle (top-right) -->
  <div style="position:fixed;top:1rem;right:4rem;z-index:10;">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
      <i class="bi bi-moon-fill" id="themeIcon"></i>
    </button>
  </div>

  <main class="auth-bg">
    <div class="auth-card">

      <!-- Logo -->
      <div class="logo-area">
        <a href="index.html">
          <img src="assets/images/logo.png" alt="Fix&Go" class="auth-logo-img">
        </a>
        <span class="logo-tagline">Your trusted repair booking platform</span>
      </div>

      <!-- Title -->
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your account to continue</p>

      <!-- Alert area -->
      <div id="loginAlert" class="auth-alert alert d-none mb-3" role="alert"></div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>

        <!-- CSRF token (simulated) -->
        <input type="hidden" name="_csrf" id="csrfToken" />

        <!-- Email -->
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            id="loginEmail"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>

        <!-- Password -->
        <div class="mb-2">
          <label for="loginPassword" class="form-label">Password</label>
          <div class="password-wrapper">
            <input
              type="password"
              class="form-control"
              id="loginPassword"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" aria-label="Show/hide password" data-target="loginPassword">
              <i class="bi bi-eye"></i>
            </button>
          </div>
          <div class="invalid-feedback">Password is required.</div>
        </div>

        <!-- Forgot password -->
        <div class="text-end mb-3">
          <a href="forgot-password.html" class="auth-link fs-sm">Forgot password?</a>
        </div>

        <!-- Remember Me -->
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="rememberMe" name="rememberMe" />
          <label class="form-check-label fs-sm" for="rememberMe">Remember me for 30 days</label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary-fg mb-3" id="loginBtn">
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="btn-text">Sign In</span>
        </button>

        <!-- Divider -->
        <div class="auth-divider">or continue with</div>

        <!-- Google OAuth -->
        <button type="button" class="btn-google mb-3" id="googleLoginBtn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" />
          Continue with Google
        </button>

        <!-- Register link -->
        <p class="text-center fs-sm mb-0" style="color:var(--fg-muted);">
          Don't have an account?
          <a href="register.html" class="auth-link">Create an Account</a>
        </p>

      </form>
    </div>
  </main>

  <script src="../bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/theme.js"></script>
  <script src="assets/js/auth-utils.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
